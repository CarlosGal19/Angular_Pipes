<section class="mx-6 space-y-2 mb-5">
  <h1 class="text-4xl font-bold">Uncommon pipes</h1>
  <h2 class="text-xs">Pipes that are not too common but could be necessary in punctual situations.</h2>
</section>
<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
  <app-card title="i18nSelectPipe">
    <p>Saludos {{client().name}}, es un placer {{client().gender | i18nSelect: invitationMap}} a nuestro evento.</p>
    <button
      class="btn btn-primary"
      (click)="changeClient()"
    >
      Change client
    </button>
  </app-card>
</div>
